site_name: Absolutely Plausible — Business Plan
site_description: Living business plan, brand identity, and project roadmap for Robot Fantôme / Absolutely Plausible
site_author: Luiz Wagner Mestrinho
site_url: https://plan.robotfantome.com/

repo_name: absolutelyplausible-business-plan
repo_url: https://github.com/wmestrinho/absolutelyplausible-business-plan

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: JetBrains Mono
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

copyright: "v0.2.0 beta · Robot Fantôme · Absolutely Plausible"

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Identity: identity.md
  - Brand: brand.md
  - Strategy: strategy.md
  - Timeline: timeline.md
  - Projects:
    - Overview: projects/index.md
    - hackFatura (PCJ): projects/hackfatura.md
    - Roadmap & Checklist: projects/roadmap.md
  - Clients:
    - PCJ / Parazinho Chassis Jig: clients/pcj.md

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true
