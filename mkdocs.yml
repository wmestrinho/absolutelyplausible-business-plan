site_name: Absolutely Plausible — Internal Plan
site_description: Internal business plan, operational dashboard, and project roadmap for Absolutely Plausible
site_author: Luiz Wagner Mestrinho
site_url: https://plan.robotfantome.com/

repo_name: absolutelyplausible-business-plan
repo_url: https://github.com/wmestrinho/absolutelyplausible-business-plan

theme:
  name: material
  palette:
    scheme: default
    primary: custom
    accent: custom
  font:
    text: Share Tech Mono
    code: Share Tech Mono
  features:
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

copyright: "v0.6.0 beta · Absolutely Plausible · Internal"

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/profile.js
  - javascripts/checklist.js

nav:
  - Home: index.md
  - Identity: identity.md
  - Brand: brand.md
  - Strategy: strategy.md
  - Timeline: timeline.md
  - Projects:
    - Overview: projects/index.md
    - hackFatura (PCJ): projects/hackfatura.md
    - Roadmap & Checklist: projects/roadmap.md
  - Clients:
    - PCJ / Parazinho Chassis Jig: clients/pcj.md

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true
